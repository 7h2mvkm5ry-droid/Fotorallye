<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fotorallye Landschaftspark Duisburg-Nord</title>
  <link rel="apple-touch-icon" href="assets/icons/app-icon.png">
  <link rel="icon" type="image/png" href="assets/icons/app-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#151816">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Fotorallye">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-head">
    <div class="brand"><span>Landschaftspark Duisburg-Nord</span><h1>Fotorallye</h1></div>
    <div class="head-status"><span id="playerBadge" class="player-badge"></span><div class="score-pill" aria-live="polite"><strong id="headerScore">0</strong><span>Punkte</span></div></div>
  </header>
  <div id="nameGate" class="name-gate" role="dialog" aria-modal="true" aria-labelledby="nameTitle">
    <form id="nameForm" class="name-card">
      <p>Landschaftspark Duisburg-Nord</p>
      <h2 id="nameTitle">Teamname eingeben</h2>
      <label for="playerName">Name</label>
      <input id="playerName" name="playerName" type="text" autocomplete="off" maxlength="32" placeholder="z.B. Team Hochofen" required>
      <button class="primary-action" type="submit">Start freischalten</button>
      <small>Der Name wird auf diesem Gerät gespeichert.</small>
    </form>
  </div>
  <main>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <section id="homeView" class="view home-view is-active" aria-label="Start">
      <div class="home-actions">
        <button id="startBtn" class="primary-action" type="button">Fotorallye starten</button>
        <button id="progressBtn" class="secondary-action" type="button">Mein Fortschritt</button>
      </div>
    </section>
    <section id="rallyView" class="view" aria-label="Fotorallye">
      <nav class="view-nav"><button class="ghost-action" type="button" data-view="homeView">Start</button><button class="ghost-action" type="button" data-view="progressView">Mein Fortschritt</button></nav>
      <div class="section-title"><p>Wähle ein Bild</p><h2>Stationen</h2></div>
      <div id="stationGrid" class="station-grid"></div>
    </section>
    <section id="questionView" class="view" aria-label="Frage">
      <nav class="view-nav"><button class="ghost-action" type="button" data-view="rallyView">Zurück</button><button class="ghost-action" type="button" data-view="progressView">Mein Fortschritt</button></nav>
      <article class="question-card">
        <div class="question-top"><span id="questionNumber"></span><span id="attemptInfo"></span></div>
        <img class="question-image" id="questionImage" alt="">
        <h2 id="questionText"></h2>
        <div id="answerGrid" class="answer-grid"></div>
        <p id="feedback" class="feedback" aria-live="polite"></p>
      </article>
    </section>
    <section id="progressView" class="view" aria-label="Mein Fortschritt">
      <nav class="view-nav"><button class="ghost-action" type="button" data-view="homeView">Start</button><button class="ghost-action" type="button" data-view="rallyView">Fotorallye</button></nav>
      <div class="progress-hero"><p>Mein Fortschritt</p><h2><span id="totalScore">0</span> Punkte</h2><div class="progress-line"><span id="progressFill"></span></div><small id="finishedCount">0 von 15 Fragen abgeschlossen</small></div>
      <div id="progressList" class="progress-list"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
